<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Бомбилы</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0c1210;--elev:#111a16;--surf:#16211c;--line:#26352e;--line2:#35473d;--ink:#e8ede9;--dim:#7f8d86;--g:#33d17e;--g2:#28b46a;--gs:#12291f;--am:#f2a73b;--red:#e2585a;--sh:0 2px 12px rgba(0,0,0,.32);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:#070a09;font-family:Inter,sans-serif;color:var(--ink);display:flex;justify-content:center;}
.device{width:100%;max-width:430px;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.checker{height:5px;flex-shrink:0;background-image:linear-gradient(45deg,var(--ink) 25%,transparent 25%),linear-gradient(-45deg,var(--ink) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,var(--ink) 75%),linear-gradient(-45deg,transparent 75%,var(--ink) 75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0;opacity:.08;}
.rsw{display:flex;gap:5px;padding:8px 14px;background:var(--elev);border-bottom:1px solid var(--line);flex-shrink:0;}
.rb{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border:1px solid transparent;}
.rb.on{background:var(--surf);border-color:var(--line2);color:var(--g);}
.top{display:flex;align-items:center;gap:10px;padding:13px 18px;background:var(--elev);border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{font-family:Oswald,sans-serif;font-weight:700;font-size:20px;letter-spacing:1.5px;text-transform:uppercase;}
.brand em{font-style:normal;color:var(--g);}
.pill{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--line);padding:6px 12px;border-radius:100px;font-size:12px;color:var(--dim);}
.pill b{font-family:'Roboto Mono',monospace;color:var(--ink);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:s 1.8s infinite;}
@keyframes s{0%,100%{opacity:1}50%{opacity:.4}}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.head{padding:16px 18px 4px;display:flex;align-items:baseline;justify-content:space-between;}
.head h2{font-family:Oswald,sans-serif;font-weight:600;font-size:16px;letter-spacing:.6px;text-transform:uppercase;}
.head .m{font-size:11.5px;color:var(--dim);font-family:'Roboto Mono',monospace;}
.hero{padding:14px 14px 4px;}
.hgrid{display:flex;gap:10px;}
.hs{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--sh);}
.hs .n{font-family:'Roboto Mono',monospace;font-weight:700;font-size:24px;line-height:1;}
.hs .n.g{color:var(--g);}.hs .n.a{color:var(--am);}
.hs .l{font-size:11.5px;color:var(--dim);margin-top:6px;}
.cta{width:100%;margin-top:11px;background:var(--g);color:#06120b;border:none;border-radius:15px;padding:16px;font-family:Oswald,sans-serif;font-weight:600;font-size:15px;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;}
.cta:active{transform:scale(.98);}
.list{padding:8px 14px 24px;}
.card{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:var(--sh);display:flex;gap:12px;align-items:center;animation:in .3s;}
.card.tap{cursor:pointer;}.card.tap:active{transform:scale(.98);}
@keyframes in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ava{width:46px;height:46px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-weight:700;font-size:18px;color:#06120b;}
.nm{font-size:15px;font-weight:600;}
.sub{font-size:12.5px;color:var(--dim);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.spot{color:var(--g);font-weight:500;}
.go{margin-left:auto;font-size:12px;font-weight:700;color:var(--g);white-space:nowrap;}
.form{padding:14px 18px;}
.addr{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:2px 14px;box-shadow:var(--sh);}
.ar{display:flex;align-items:center;gap:12px;padding:15px 0;}
.ar+.ar{border-top:1px solid var(--line);}
.pin{width:11px;height:11px;flex-shrink:0;border-radius:50%;background:var(--g);box-shadow:0 0 0 4px var(--gs);}
.pin.to{border-radius:3px;background:var(--am);box-shadow:0 0 0 4px rgba(242,167,59,.18);}
.ar input{border:none;background:transparent;outline:none;color:var(--ink);font-size:15px;width:100%;font-weight:500;font-family:Inter,sans-serif;}
.ar input::placeholder{color:var(--dim);font-weight:400;}
.chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.chip{background:var(--surf);border:1px solid var(--line);border-radius:100px;padding:8px 13px;font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;}
.chip.add{border-style:dashed;color:var(--g);border-color:rgba(51,209,126,.45);}
.chip .x{color:var(--dim);font-size:11px;}
.btn{width:100%;margin-top:14px;background:var(--g);color:#06120b;border:none;border-radius:15px;padding:17px;font-family:Oswald,sans-serif;font-weight:600;font-size:16px;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;}
.btn:active{transform:scale(.98);}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line2);font-family:Inter,sans-serif;font-size:14px;text-transform:none;letter-spacing:0;padding:14px;margin-top:10px;}
.btn.dang{background:transparent;color:var(--red);border:1px solid rgba(226,88,90,.4);font-family:Inter,sans-serif;font-size:14px;text-transform:none;letter-spacing:0;padding:14px;margin-top:10px;}
.note{text-align:center;font-size:12px;color:var(--dim);margin-top:14px;line-height:1.6;}
.wait{padding:24px 18px 6px;text-align:center;}
.bea{width:56px;height:56px;margin:0 auto 12px;position:relative;}
.bea i{position:absolute;inset:0;border-radius:50%;border:2px solid var(--g);opacity:0;animation:p 2s infinite;}
.bea i:nth-child(2){animation-delay:.66s}.bea i:nth-child(3){animation-delay:1.33s}
.bea b{position:absolute;inset:20px;border-radius:50%;background:var(--g);}
@keyframes p{0%{transform:scale(.3);opacity:.9}100%{transform:scale(1);opacity:0}}
.wait h3{font-family:Oswald,sans-serif;font-weight:600;font-size:16px;}
.wait p{font-size:12.5px;color:var(--dim);margin-top:5px;}
.price{font-family:'Roboto Mono',monospace;font-weight:700;font-size:17px;}
.pick{background:var(--g);color:#06120b;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:44px 26px;color:var(--dim);font-size:13px;line-height:1.6;}
.empty b{display:block;font-family:Oswald,sans-serif;font-size:16px;color:var(--ink);margin-bottom:6px;}
.ok{width:60px;height:60px;border-radius:20px;background:var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.conf{padding:24px 20px;text-align:center;}
.conf h3{font-family:Oswald,sans-serif;font-weight:600;font-size:19px;}
.conf p{font-size:12.5px;color:var(--dim);margin-top:6px;}
.dbox{margin-top:18px;background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;text-align:left;}
.fl{padding:10px 18px;}
.fr{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;}
.fr label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;}
.fr input{width:100%;background:transparent;border:none;outline:none;color:var(--ink);font-size:15px;font-weight:500;font-family:Inter,sans-serif;}
.fr input::placeholder{color:var(--dim);font-weight:400;}
.sv{padding:6px 18px 24px;}
.obar{display:flex;align-items:center;justify-content:space-between;margin:14px;padding:14px;background:var(--surf);border:1px solid var(--line);border-radius:15px;}
.obar.off{border-color:rgba(226,88,90,.45);}
.obar .l{font-size:14px;font-weight:600;}
.obar.off .l{color:var(--red);}
.tg{width:46px;height:27px;border-radius:100px;background:var(--line2);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.tg.on{background:var(--g);}
.tg b{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}
.tg.on b{left:22px;}
.req{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:15px;margin:0 14px 11px;box-shadow:var(--sh);animation:in .3s;}
.req.direct{border-color:var(--am);}
.req .rt{font-size:15.5px;font-weight:600;}
.req .rm{font-size:12.5px;color:var(--dim);margin-top:4px;}
.req .rp{display:flex;align-items:center;gap:8px;margin-top:12px;}
.req .rp input{width:100px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:10px;color:var(--ink);font-family:'Roboto Mono',monospace;font-weight:700;font-size:15px;text-align:center;outline:none;}
.ra{display:flex;gap:8px;margin-top:10px;}
.ra .acc{flex:1;background:var(--g);color:#06120b;border:none;border-radius:11px;padding:12px;font-weight:700;font-size:13.5px;cursor:pointer;}
.ra .skip{background:transparent;color:var(--dim);border:1px solid var(--line2);border-radius:11px;padding:12px 16px;font-weight:600;font-size:13.5px;cursor:pointer;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.3px;}
.badge.am{background:rgba(242,167,59,.2);color:var(--am);}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
.ast{background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:15px;}
.ast .n{font-family:'Roboto Mono',monospace;font-weight:700;font-size:23px;}
.ast .n.g{color:var(--g)}.ast .n.a{color:var(--am)}
.ast .l{font-size:11.5px;color:var(--dim);margin-top:5px;}
.ai{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);}
.ai .ava{width:38px;height:38px;font-size:14px;border-radius:11px;}
.rolebtn{background:transparent;color:var(--dim);border:1px solid var(--line2);border-radius:9px;padding:7px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
nav{display:flex;background:var(--elev);border-top:1px solid var(--line);padding:9px 8px calc(14px + env(safe-area-inset-bottom));flex-shrink:0;}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--dim);cursor:pointer;padding:4px 0;}
.nb.active{color:var(--g);}
.nb svg{width:21px;height:21px;}
.ph{padding:24px 20px 18px;text-align:center;background:var(--elev);border-bottom:1px solid var(--line);}
.pa{width:70px;height:70px;border-radius:22px;margin:0 auto 12px;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-weight:700;font-size:27px;color:#06120b;}
.pn{font-family:Oswald,sans-serif;font-weight:600;font-size:19px;}
.pr{font-size:12.5px;color:var(--dim);margin-top:3px;}
.ml{padding:6px 18px 24px;}
.mi{display:flex;align-items:center;justify-content:space-between;padding:15px 4px;border-bottom:1px solid var(--line);font-size:14.5px;font-weight:500;cursor:pointer;}
.mi .c{color:var(--dim);}
.mask{position:fixed;inset:0;background:rgba(4,6,5,.7);z-index:80;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:430px;background:var(--surf);border-radius:22px 22px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));}
.sheet h3{font-family:Oswald,sans-serif;font-weight:600;font-size:17px;margin-bottom:4px;}
.sheet .s{font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.5;}
.sa{display:flex;gap:8px;margin-top:14px;}
.sa button{flex:1;border-radius:12px;padding:13px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
.sa .c{background:transparent;border:1px solid var(--line2);color:var(--dim);}
.sa .o{background:var(--g);color:#06120b;}
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);background:var(--g);color:#06120b;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:.28s;z-index:90;pointer-events:none;max-width:88%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;color:var(--dim);font-size:14px;padding:20px;text-align:center;}
</style>
</head>
<body>
<div class="device" id="device">
  <div class="checker"></div>
  <div class="rsw" id="rsw" style="display:none"></div>
  <div class="top"><div class="brand">Бом<em>билы</em></div><div class="pill"><span class="dot"></span><b id="onl">0</b>&nbsp;на линии</div></div>
  <div class="body" id="main"></div>
  <nav id="nav"></nav>
  <div id="toast"></div>
</div>
<div id="boot">Загрузка…</div>
<script>
const SUPABASE_URL="https://wygmuydnodwpbtsdfjuq.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5Z211eWRub2R3cGJ0c2RmanVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA5MTAsImV4cCI6MjEwMDE1NjkxMH0.hrU9TwCQzplTLkShaF8djP9PqANbBrTCJuvlNk84dGw";
const OWNER_ID=8672930773;

const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const tg=window.Telegram?.WebApp;try{tg?.ready();tg?.expand();}catch(e){}
const tu=tg?.initDataUnsafe?.user;
let tgId=tu?.id;
if(!tgId){let s=localStorage.getItem('bmb_id');if(!s){s=Math.floor(Math.random()*1e9);localStorage.setItem('bmb_id',s);}tgId=Number(s);}
const tgName=tu?.first_name||('Гость'+String(tgId).slice(-3));

let me=null,role='passenger',pTab='home',dTab='inbox';
let rideId=null,offCh=null,inCh=null,myCh=null,reqs=[];

const T=t=>{const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>e.classList.remove('show'),2400);};
const esc=s=>String(s||'').replace(/[<>"']/g,'');
const places=()=>{try{return JSON.parse(me.places||'[]')}catch(e){return[]}};
const isStaff=()=>me&&['owner','admin','moderator'].includes(me.staff_role);
const isDrv=()=>me&&(me.role==='driver'||me.role==='both');

async function boot(){
 try{
  let{data}=await db.from('users').select('*').eq('telegram_id',tgId).maybeSingle();
  if(!data){const r=await db.from('users').insert({telegram_id:tgId,name:tgName}).select().single();if(r.error)throw r.error;data=r.data;}
  me=data;
  if(tgId===OWNER_ID&&me.staff_role!=='owner'){await db.from('users').update({staff_role:'owner'}).eq('id',me.id);me.staff_role='owner';}
  document.getElementById('boot').style.display='none';
  drawRoles();count();setInterval(count,10000);
  setRole('passenger');
 }catch(e){document.getElementById('boot').innerHTML='<div style="color:#e2585a">Ошибка подключения к базе:<br><br>'+e.message+'<br><br>Проверьте, что SQL из db-3.sql выполнен в Supabase.</div>';}
}
async function count(){const{count:c}=await db.from('users').select('*',{count:'exact',head:true}).eq('status','online');const e=document.getElementById('onl');if(e)e.textContent=c||0;}

function drawRoles(){
 const s=document.getElementById('rsw');
 if(!isDrv()&&!isStaff()){s.style.display='none';return;}
 let h=`<div class="rb ${role==='passenger'?'on':''}" onclick="setRole('passenger')">Пассажир</div>`;
 if(isDrv())h+=`<div class="rb ${role==='driver'?'on':''}" onclick="setRole('driver')">Водитель</div>`;
 if(isStaff())h+=`<div class="rb ${role==='admin'?'on':''}" onclick="setRole('admin')">Панель</div>`;
 s.style.display='flex';s.innerHTML=h;
}
function setRole(r){
 if(r==='admin'&&!isStaff())return T('Нет доступа');
 if(r==='driver'&&!isDrv())return T('Сначала пройдите модерацию');
 role=r;drawRoles();
 if(r==='passenger'){pTab='home';drawP();}
 if(r==='driver'){dTab='inbox';drawD();}
 if(r==='admin')drawA();
}

/* ============ ПАССАЖИР ============ */
function drawP(){
 document.getElementById('nav').innerHTML=`
 <button class="nb ${pTab==='home'?'active':''}" onclick="pGo('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Главная</button>
 <button class="nb ${pTab==='trips'?'active':''}" onclick="pGo('trips')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>Поездки</button>
 <button class="nb ${pTab==='profile'?'active':''}" onclick="pGo('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button>`;
 const m=document.getElementById('main');
 if(pTab==='home')home(m);
 if(pTab==='order')m.innerHTML=`<div id="host">${formHTML(null)}</div>`;
 if(pTab==='trips')trips(m);
 if(pTab==='profile')m.innerHTML=profHTML();
}
const pGo=t=>{pTab=t;drawP();};

async function home(m){
 m.innerHTML=`<div class="hero"><div class="hgrid"><div class="hs"><div class="n g" id="c1">…</div><div class="l">водителей на линии</div></div><div class="hs"><div class="n a" id="c2">…</div><div class="l">открытых заявок</div></div></div><button class="cta" onclick="pTab='order';drawP()">Заявка всем водителям</button></div><div class="head"><h2>Свободные водители</h2><span class="m">нажмите, чтобы позвать</span></div><div class="list" id="dl"><div class="empty">Загрузка…</div></div>`;
 const{data:ds}=await db.from('users').select('*').eq('status','online').in('role',['driver','both']);
 const{count:rc}=await db.from('rides').select('*',{count:'exact',head:true}).eq('status','created');
 const a=document.getElementById('c1');if(a)a.textContent=(ds||[]).length;
 const b=document.getElementById('c2');if(b)b.textContent=rc||0;
 const l=document.getElementById('dl');if(!l)return;
 if(!ds||!ds.length){l.innerHTML='<div class="empty"><b>Сейчас никого нет</b>Как только водитель выйдет на линию — он появится здесь, и вы сможете отправить заявку лично ему.</div>';return;}
 l.innerHTML=ds.map(d=>`<div class="card tap" onclick="pickDriver('${d.id}')"><div class="ava">${esc(d.name)[0]||'?'}</div><div style="flex:1;min-width:0"><div class="nm">${esc(d.name)}</div><div class="sub">${d.spot?'<span class="spot">📍 '+esc(d.spot)+'</span>':'<span>место не указано</span>'}${d.car?'<span>· '+esc(d.car)+'</span>':''}</div></div><span class="go">позвать →</span></div>`).join('');
}

let targetDrv=null;
async function pickDriver(id){
 const{data}=await db.from('users').select('*').eq('id',id).single();
 targetDrv=data;pTab='order';drawP();
 document.getElementById('main').innerHTML=`<div id="host">${formHTML(data)}</div>`;
}
function formHTML(d){
 const ch=places().map((p,i)=>`<div class="chip" onclick="document.getElementById('to').value='${esc(p)}'">📍 ${esc(p)}<span class="x" onclick="event.stopPropagation();delPlace(${i})">✕</span></div>`).join('');
 const hdr=d?`<div class="card" style="margin:14px 14px 0"><div class="ava">${esc(d.name)[0]}</div><div style="flex:1"><div class="nm">${esc(d.name)}</div><div class="sub">${d.spot?'<span class="spot">📍 '+esc(d.spot)+'</span>':''}${d.car?'<span>· '+esc(d.car)+'</span>':''}</div></div></div>`:'';
 return `<div class="head"><h2>${d?'Заявка водителю':'Заявка всем'}</h2></div>${hdr}<div class="form"><div class="addr"><div class="ar"><span class="pin"></span><input id="from" placeholder="Откуда" value="Моё местоположение"></div><div class="ar"><span class="pin to"></span><input id="to" placeholder="Куда едем"></div></div><div class="chips">${ch}<div class="chip add" onclick="addPlace()">＋ Сохранить место</div></div><button class="btn" onclick="send(${d?"'"+d.id+"'":'null'})">Отправить заявку</button><button class="btn ghost" onclick="targetDrv=null;pTab='home';drawP()">Назад</button><div class="note">${d?esc(d.name)+' получит заявку и назовёт свою цену — вы решите, принимать или нет.':'Заявку увидят все водители на линии. Каждый пришлёт свою цену.'}</div></div>`;
}
async function addPlace(){
 const cur=document.getElementById('to')?.value.trim();
 const v=cur||prompt('Название места (например: Дом, Работа):');
 if(!v)return;
 const p=places();if(p.includes(v))return T('Уже сохранено');
 p.push(v);me.places=JSON.stringify(p);
 await db.from('users').update({places:me.places}).eq('id',me.id);
 T('Место сохранено');document.getElementById('host').innerHTML=formHTML(targetDrv);
}
async function delPlace(i){
 const p=places();p.splice(i,1);me.places=JSON.stringify(p);
 await db.from('users').update({places:me.places}).eq('id',me.id);
 T('Удалено');document.getElementById('host').innerHTML=formHTML(targetDrv);
}
async function send(did){
 const f=document.getElementById('from').value.trim()||'Моё местоположение';
 const t=document.getElementById('to').value.trim();
 if(!t)return T('Укажите, куда едем');
 const row={passenger_id:me.id,passenger_name:me.name,from_address:f,to_address:t,status:'created'};
 if(did)row.target_driver_id=did;
 const{data,error}=await db.from('rides').insert(row).select().single();
 if(error)return T('Ошибка: '+error.message);
 rideId=data.id;waiting(f,t,did);subOffers(data.id);
}
function waiting(f,t,did){
 document.getElementById('host').innerHTML=`<div class="wait"><div class="bea"><i></i><i></i><i></i><b></b></div><h3>${did?'Ждём ответ водителя':'Ищем свободных'}</h3><p>${esc(f)} → ${esc(t)}</p></div><div class="list" id="offs"><div class="empty">Ждём предложений по цене…</div></div><div style="padding:0 18px 24px"><button class="btn dang" onclick="cancel()">Отменить заявку</button></div>`;
}
function subOffers(id){
 if(offCh)db.removeChannel(offCh);
 offCh=db.channel('o'+id).on('postgres_changes',{event:'INSERT',schema:'public',table:'offers',filter:'ride_id=eq.'+id},p=>addOff(p.new)).subscribe();
 db.from('offers').select('*').eq('ride_id',id).then(({data})=>(data||[]).forEach(addOff));
}
function addOff(o){
 const b=document.getElementById('offs');if(!b||document.getElementById('of'+o.id))return;
 if(b.querySelector('.empty'))b.innerHTML='';
 b.insertAdjacentHTML('afterbegin',`<div class="card" id="of${o.id}"><div class="ava">${esc(o.driver_name)[0]||'?'}</div><div style="flex:1;min-width:0"><div class="nm">${esc(o.driver_name)||'Водитель'}</div><div class="sub">${esc(o.car)||'—'}</div></div><div style="text-align:right"><div class="price">${o.price} ₽</div><button class="pick" style="margin-top:6px" onclick="accept('${o.id}','${o.driver_id}','${esc(o.driver_name)}','${esc(o.car)}',${o.price})">Принять</button></div></div>`);
 T('Пришла цена: '+o.price+' ₽');
}
async function accept(oid,did,dn,car,pr){
 await db.from('rides').update({driver_id:did,status:'confirmed'}).eq('id',rideId);
 await db.from('offers').update({status:'selected'}).eq('id',oid);
 if(offCh){db.removeChannel(offCh);offCh=null;}
 document.getElementById('host').innerHTML=`<div class="conf"><div class="ok"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#06120b" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><h3>Бомбила выехал</h3><p>Остальным ушло «занято»</p><div class="dbox"><div class="ava">${dn[0]||'?'}</div><div><div class="nm">${dn}</div><div class="sub">${car||'—'}</div><div class="price" style="margin-top:6px">${pr} ₽</div></div></div><button class="btn dang" onclick="finish()">Завершить поездку</button></div>`;
}
async function cancel(){if(rideId)await db.from('rides').update({status:'cancelled_by_passenger_free'}).eq('id',rideId);if(offCh){db.removeChannel(offCh);offCh=null;}rideId=null;targetDrv=null;T('Заявка отменена');pTab='home';drawP();}
async function finish(){if(rideId)await db.from('rides').update({status:'completed'}).eq('id',rideId);rideId=null;targetDrv=null;T('Поездка завершена');pTab='home';drawP();}

async function trips(m){
 m.innerHTML='<div class="head"><h2>Мои поездки</h2></div><div class="list"><div class="empty">Загрузка…</div></div>';
 const{data}=await db.from('rides').select('*').eq('passenger_id',me.id).order('created_at',{ascending:false}).limit(30);
 const l=m.querySelector('.list');
 if(!data||!data.length){l.innerHTML='<div class="empty"><b>Пока пусто</b>Здесь появится история ваших заявок.</div>';return;}
 const st={created:'ждёт',confirmed:'подтверждена',completed:'завершена'};
 l.innerHTML=data.map(r=>`<div class="card"><div style="flex:1"><div class="nm">${esc(r.from_address)} → ${esc(r.to_address)}</div><div class="sub">${st[r.status]||esc(r.status)} · ${new Date(r.created_at).toLocaleDateString('ru')}</div></div></div>`).join('');
}

function profHTML(){
 return `<div class="ph"><div class="pa">${esc(me.name)[0]||'?'}</div><div class="pn">${esc(me.name)}</div><div class="pr">${isDrv()?'Водитель':'Пассажир'} · рейтинг ${me.rating||5}</div></div><div class="fl"><div class="fr"><label>Имя</label><input id="f1" value="${esc(me.name)}"></div><div class="fr"><label>Телефон</label><input id="f2" value="${esc(me.phone)}" inputmode="tel" placeholder="+7 900 000-00-00"></div><div class="fr"><label>Возраст (не обязательно)</label><input id="f3" value="${me.age||''}" inputmode="numeric"></div></div><div class="sv"><button class="btn" onclick="saveP()">Сохранить</button></div><div class="ml">${me.driver_status==='pending'?'<div class="mi" style="color:var(--am)"><span>Заявка в водители на проверке ⏳</span></div>':(isDrv()?'':'<div class="mi" onclick="applyDrv()"><span>Стать бомбилой</span><span class="c">›</span></div>')}<div class="mi" onclick="T('Поддержка: напишите в бот')"><span>Поддержка</span><span class="c">›</span></div></div>`;
}
async function saveP(){
 const n=document.getElementById('f1').value.trim();if(!n)return T('Введите имя');
 const p={name:n,phone:document.getElementById('f2').value.trim(),age:parseInt(document.getElementById('f3').value)||null};
 const{error}=await db.from('users').update(p).eq('id',me.id);
 if(error)return T('Ошибка: '+error.message);
 Object.assign(me,p);T('Сохранено');drawP();
}
function applyDrv(){
 const m=document.createElement('div');m.className='mask';m.id='sh';
 m.innerHTML=`<div class="sheet"><h3>Стать бомбилой</h3><div class="s">Заявка уйдёт на проверку. Марку и номер машины впишет администратор после одобрения — сами вы их менять не сможете.</div><div class="fr"><label>Телефон</label><input id="ap" value="${esc(me.phone)}" placeholder="+7 900 000-00-00" inputmode="tel"></div><div class="sa"><button class="c" onclick="closeSh()">Отмена</button><button class="o" onclick="sendApp()">Отправить</button></div></div>`;
 document.getElementById('device').appendChild(m);
}
async function sendApp(){
 const p=document.getElementById('ap').value.trim();if(!p)return T('Введите телефон');
 await db.from('users').update({phone:p,driver_status:'pending'}).eq('id',me.id);
 me.phone=p;me.driver_status='pending';closeSh();T('Заявка отправлена на модерацию');drawP();
}
const closeSh=()=>{const s=document.getElementById('sh');if(s)s.remove();};

/* ============ ВОДИТЕЛЬ ============ */
function drawD(){
 document.getElementById('nav').innerHTML=`
 <button class="nb ${dTab==='inbox'?'active':''}" onclick="dGo('inbox')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5h13L22 12v6a2 2 0 01-2 2H4a2 2 0 01-2-2v-6z"/></svg>Заявки</button>
 <button class="nb ${dTab==='profile'?'active':''}" onclick="dGo('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button>`;
 const m=document.getElementById('main');
 if(dTab==='inbox')inbox(m);
 if(dTab==='profile')m.innerHTML=dProfHTML();
}
const dGo=t=>{dTab=t;drawD();};
async function inbox(m){
 const on=me.status==='online';
 m.innerHTML=`<div class="obar ${on?'':'off'}"><div><div class="l">${on?'Вы на линии':'Вы оффлайн'}</div><div style="font-size:11.5px;color:var(--dim);margin-top:2px">${on?'получаете заявки':'заявки не приходят'}</div></div><div class="tg ${on?'on':''}" onclick="tglOn()"><b></b></div></div>
 <div class="card" style="margin:0 14px 14px" onclick="setSpot()"><div style="flex:1"><div class="nm">${me.spot?'📍 '+esc(me.spot):'Где вы стоите?'}</div><div class="sub">${me.spot?'это видят пассажиры':'укажите место — так вас найдут быстрее'}</div></div><span class="go">${me.spot?'изменить':'указать'} →</span></div>
 <div class="head"><h2>Входящие заявки</h2></div><div id="il" class="list"><div class="empty">${on?'Ждём заявки…':'Выйдите на линию, чтобы получать заявки'}</div></div>`;
 if(on){await load();subIn();subMine();}
}
async function tglOn(){
 const s=me.status==='online'?'offline':'online';
 await db.from('users').update({status:s,last_active:new Date().toISOString()}).eq('id',me.id);
 me.status=s;if(s==='offline'&&inCh){db.removeChannel(inCh);inCh=null;}
 drawD();count();
}
function setSpot(){
 const m=document.createElement('div');m.className='mask';m.id='sh';
 m.innerHTML=`<div class="sheet"><h3>Где вы стоите</h3><div class="s">Напишите ориентир — район, улицу или заметное место. Это увидят пассажиры в списке.</div><div class="fr"><label>Место</label><input id="sp" value="${esc(me.spot)}" placeholder="Например: центр, у магазина Милка"></div><div class="sa"><button class="c" onclick="closeSh()">Отмена</button><button class="o" onclick="saveSpot()">Сохранить</button></div></div>`;
 document.getElementById('device').appendChild(m);
}
async function saveSpot(){
 const v=document.getElementById('sp').value.trim();
 await db.from('users').update({spot:v}).eq('id',me.id);me.spot=v;closeSh();T('Место обновлено');drawD();
}
async function load(){
 const{data}=await db.from('rides').select('*').eq('status','created').order('created_at',{ascending:false});
 reqs=(data||[]).filter(r=>!r.target_driver_id||r.target_driver_id===me.id);
 drawReqs();
}
function drawReqs(){
 const l=document.getElementById('il');if(!l)return;
 if(!reqs.length){l.innerHTML='<div class="empty"><b>Пока тихо</b>Новые заявки появятся здесь сразу.</div>';return;}
 l.innerHTML=reqs.map(r=>`<div class="req ${r.target_driver_id?'direct':''}">${r.target_driver_id?'<span class="badge am">лично вам</span>':''}<div class="rt" style="margin-top:${r.target_driver_id?'8px':'0'}">${esc(r.from_address)} → ${esc(r.to_address)}</div><div class="rm">от ${esc(r.passenger_name)||'пассажира'}</div><div class="rp"><input type="number" id="p${r.id}" placeholder="цена"><span style="color:var(--dim);font-size:14px">₽ — ваша цена</span></div><div class="ra"><button class="acc" onclick="offer('${r.id}')">Отправить цену</button><button class="skip" onclick="skip('${r.id}')">Пропустить</button></div></div>`).join('');
}
function subIn(){
 if(inCh)db.removeChannel(inCh);
 inCh=db.channel('in').on('postgres_changes',{event:'INSERT',schema:'public',table:'rides'},p=>{
   const r=p.new;if(r.status!=='created')return;
   if(r.target_driver_id&&r.target_driver_id!==me.id)return;
   reqs.unshift(r);drawReqs();T(r.target_driver_id?'Заявка лично вам!':'Новая заявка!');
 }).subscribe();
}
function subMine(){
 if(myCh)db.removeChannel(myCh);
 myCh=db.channel('m'+me.id).on('postgres_changes',{event:'UPDATE',schema:'public',table:'rides',filter:'driver_id=eq.'+me.id},p=>{if(p.new.status==='confirmed')won(p.new);}).subscribe();
}
async function offer(rid){
 const v=document.getElementById('p'+rid).value;
 if(!v)return T('Укажите цену');
 const{error}=await db.from('offers').insert({ride_id:rid,driver_id:me.id,driver_name:me.name,car:me.car,price:Number(v),eta_minutes:5});
 if(error)return T('Ошибка: '+error.message);
 reqs=reqs.filter(r=>r.id!==rid);drawReqs();T('Цена отправлена: '+v+' ₽');
}
const skip=rid=>{reqs=reqs.filter(r=>r.id!==rid);drawReqs();};
function won(r){
 document.getElementById('main').innerHTML=`<div class="conf"><div class="ok"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#06120b" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><h3>Вас выбрали!</h3><p>${esc(r.from_address)} → ${esc(r.to_address)}</p><div class="dbox"><div class="ava">${esc(r.passenger_name)[0]||'?'}</div><div><div class="nm">${esc(r.passenger_name)||'Пассажир'}</div><div class="sub">ждёт вас</div></div></div><button class="btn" onclick="dGo('inbox')">К заявкам</button></div>`;
 T('Заказ ваш!');
}
function dProfHTML(){
 return `<div class="ph"><div class="pa">${esc(me.name)[0]||'?'}</div><div class="pn">${esc(me.name)}</div><div class="pr">Водитель · ${esc(me.car)||'машина не назначена'}${me.plate?' · '+esc(me.plate):''}</div></div><div class="fl"><div class="fr"><label>Имя</label><input id="d1" value="${esc(me.name)}"></div><div class="fr"><label>Телефон</label><input id="d2" value="${esc(me.phone)}" inputmode="tel"></div><div class="fr"><label>Где стою</label><input id="d3" value="${esc(me.spot)}" placeholder="центр, у рынка…"></div><div class="fr" style="opacity:.65"><label>Машина · назначает админ 🔒</label><input value="${esc(me.car)||'—'}" disabled></div><div class="fr" style="opacity:.65"><label>Гос. номер · назначает админ 🔒</label><input value="${esc(me.plate)||'—'}" disabled></div></div><div class="sv"><button class="btn" onclick="saveD()">Сохранить</button><button class="btn ghost" onclick="setRole('passenger')">Вернуться как пассажир</button></div>`;
}
async function saveD(){
 const n=document.getElementById('d1').value.trim();if(!n)return T('Введите имя');
 const p={name:n,phone:document.getElementById('d2').value.trim(),spot:document.getElementById('d3').value.trim()};
 await db.from('users').update(p).eq('id',me.id);Object.assign(me,p);T('Сохранено');drawD();
}

/* ============ ПАНЕЛЬ ============ */
async function drawA(){
 document.getElementById('nav').innerHTML=`<button class="nb active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Обзор</button><button class="nb" onclick="setRole('passenger')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Выйти</button>`;
 const m=document.getElementById('main');m.innerHTML='<div class="empty">Загрузка…</div>';
 const{count:rides}=await db.from('rides').select('*',{count:'exact',head:true});
 const{count:on}=await db.from('users').select('*',{count:'exact',head:true}).eq('status','online');
 const{data:apps}=await db.from('users').select('*').eq('driver_status','pending');
 const{data:us}=await db.from('users').select('*').order('created_at',{ascending:false}).limit(40);
 m.innerHTML=`<div class="head"><h2>Панель · Бомбилы</h2><span class="m">${me.staff_role}</span></div>
 <div class="agrid"><div class="ast"><div class="n g">${rides||0}</div><div class="l">всего заявок</div></div><div class="ast"><div class="n">${on||0}</div><div class="l">на линии</div></div><div class="ast"><div class="n a">${(apps||[]).length}</div><div class="l">заявок в водители</div></div><div class="ast"><div class="n">${(us||[]).length}</div><div class="l">пользователей</div></div></div>
 <div class="head"><h2>Заявки в водители</h2></div><div style="padding:6px 0">${(apps||[]).length?apps.map(a=>`<div class="req"><div class="rt">${esc(a.name)}</div><div class="rm">${esc(a.phone)||'без телефона'} · ID ${a.telegram_id}</div><div class="fr" style="margin-top:10px"><label>Марка машины</label><input id="ac${a.id}" placeholder="Lada Vesta"></div><div class="fr"><label>Гос. номер</label><input id="ap${a.id}" placeholder="А123ВС"></div><div class="ra"><button class="acc" onclick="okDrv('${a.id}')">Одобрить</button><button class="skip" onclick="noDrv('${a.id}')">Отклонить</button></div></div>`).join(''):'<div class="empty">Новых заявок нет</div>'}</div>
 <div class="head"><h2>Пользователи</h2><span class="m">роли</span></div><div style="padding:6px 0 24px">${(us||[]).map(u=>{
   const mine=u.id===me.id;
   const can=(me.staff_role==='owner'&&!mine&&u.staff_role!=='owner')||(me.staff_role==='admin'&&!mine&&!['owner','admin'].includes(u.staff_role));
   const bd=u.staff_role&&u.staff_role!=='none'?`<span class="badge am">${u.staff_role==='owner'?'владелец':u.staff_role==='admin'?'админ':'модератор'}</span>`:'';
   return `<div class="ai"><div class="ava">${esc(u.name)[0]||'?'}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${esc(u.name)}${mine?' (вы)':''}</div><div style="font-size:11.5px;color:var(--dim)">${u.role}${u.car?' · '+esc(u.car):''} · ${u.status}</div></div>${bd}${can?`<button class="rolebtn" onclick="cyc('${u.id}','${u.staff_role||'none'}')">роль ⇄</button>`:''}</div>`;
 }).join('')}</div>`;
}
async function okDrv(id){
 const c=document.getElementById('ac'+id).value.trim(),p=document.getElementById('ap'+id).value.trim();
 if(!c||!p)return T('Впишите марку и номер');
 await db.from('users').update({role:'driver',driver_status:'approved',car:c,plate:p}).eq('id',id);
 T('Водитель одобрен');drawA();
}
async function noDrv(id){await db.from('users').update({driver_status:'none'}).eq('id',id);T('Отклонено');drawA();}
async function cyc(id,cur){
 let n;
 if(me.staff_role==='owner')n=cur==='none'?'moderator':cur==='moderator'?'admin':'none';
 else n=cur==='none'?'moderator':'none';
 await db.from('users').update({staff_role:n}).eq('id',id);
 T(n==='none'?'Права сняты':'Назначен: '+(n==='admin'?'админ':'модератор'));drawA();
}
boot();
</script>
</body>
</html>
