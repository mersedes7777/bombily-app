<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Бомбилы</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0c1210;--elev:#111a16;--surf:#16211c;--line:#26352e;--line2:#35473d;--ink:#e8ede9;--dim:#7f8d86;--g:#33d17e;--g2:#28b46a;--gs:#12291f;--am:#f2a73b;--red:#e2585a;--sh:0 2px 12px rgba(0,0,0,.32);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:#070a09;font-family:Inter,sans-serif;color:var(--ink);display:flex;justify-content:center;}
.device{width:100%;max-width:430px;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.checker{height:5px;flex-shrink:0;background-image:linear-gradient(45deg,var(--ink) 25%,transparent 25%),linear-gradient(-45deg,var(--ink) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,var(--ink) 75%),linear-gradient(-45deg,transparent 75%,var(--ink) 75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0;opacity:.08;}
.rsw{display:flex;gap:5px;padding:8px 14px;background:var(--elev);border-bottom:1px solid var(--line);flex-shrink:0;}
.rb{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border:1px solid transparent;}
.rb.on{background:var(--surf);border-color:var(--line2);color:var(--g);}
.top{display:flex;align-items:center;gap:10px;padding:13px 18px;background:var(--elev);border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{font-family:Oswald,sans-serif;font-weight:700;font-size:20px;letter-spacing:1.5px;text-transform:uppercase;}
.brand em{font-style:normal;color:var(--g);}
.pill{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--line);padding:6px 12px;border-radius:100px;font-size:12px;color:var(--dim);}
.pill b{font-family:'Roboto Mono',monospace;color:var(--ink);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:s 1.8s infinite;}
@keyframes s{0%,100%{opacity:1}50%{opacity:.4}}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.head{padding:16px 18px 4px;display:flex;align-items:baseline;justify-content:space-between;}
.head h2{font-family:Oswald,sans-serif;font-weight:600;font-size:16px;letter-spacing:.6px;text-transform:uppercase;}
.head .m{font-size:11.5px;color:var(--dim);font-family:'Roboto Mono',monospace;}
.hero{padding:14px 14px 4px;}
.hgrid{display:flex;gap:10px;}
.hs{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--sh);}
.hs .n{font-family:'Roboto Mono',monospace;font-weight:700;font-size:24px;line-height:1;}
.hs .n.g{color:var(--g);}.hs .n.a{color:var(--am);}
.hs .l{font-size:11.5px;color:var(--dim);margin-top:6px;}
.cta{width:100%;margin-top:11px;background:var(--g);color:#06120b;border:none;border-radius:15px;padding:16px;font-family:Oswald,sans-serif;font-weight:600;font-size:15px;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;}
.cta:active{transform:scale(.98);}
.list{padding:8px 14px 24px;}
.card{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:var(--sh);display:flex;gap:12px;align-items:center;animation:in .3s;}
.card.tap{cursor:pointer;}.card.tap:active{transform:scale(.98);}
@keyframes in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ava{width:46px;height:46px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-weight:700;font-size:18px;color:#06120b;}
.nm{font-size:15px;font-weight:600;}
.sub{font-size:12.5px;color:var(--dim);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.spot{color:var(--g);font-weight:500;}
.go{margin-left:auto;font-size:12px;font-weight:700;color:var(--g);white-space:nowrap;}
.form{padding:14px 18px;}
.addr{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:2px 14px;box-shadow:var(--sh);}
.ar{display:flex;align-items:center;gap:12px;padding:15px 0;}
.ar+.ar{border-top:1px solid var(--line);}
.pin{width:11px;height:11px;flex-shrink:0;border-radius:50%;background:var(--g);box-shadow:0 0 0 4px var(--gs);}
.pin.to{border-radius:3px;background:var(--am);box-shadow:0 0 0 4px rgba(242,167,59,.18);}
.ar input{border:none;background:transparent;outline:none;color:var(--ink);font-size:15px;width:100%;font-weight:500;font-family:Inter,sans-serif;}
.ar input::placeholder{color:var(--dim);font-weight:400;}
.chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.chip{background:var(--surf);border:1px solid var(--line);border-radius:100px;padding:8px 13px;font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;}
.chip.add{border-style:dashed;color:var(--g);border-color:rgba(51,209,126,.45);}
.chip .x{color:var(--dim);font-size:11px;}
.btn{width:100%;margin-top:14px;background:var(--g);color:#06120b;border:none;border-radius:15px;padding:17px;font-family:Oswald,sans-serif;font-weight:600;font-size:16px;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;}
.btn:active{transform:scale(.98);}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line2);font-family:Inter,sans-serif;font-size:14px;text-transform:none;letter-spacing:0;padding:14px;margin-top:10px;}
.btn.dang{background:transparent;color:var(--red);border:1px solid rgba(226,88,90,.4);font-family:Inter,sans-serif;font-size:14px;text-transform:none;letter-spacing:0;padding:14px;margin-top:10px;}
.note{text-align:center;font-size:12px;color:var(--dim);margin-top:14px;line-height:1.6;}
.wait{padding:24px 18px 6px;text-align:center;}
.bea{width:56px;height:56px;margin:0 auto 12px;position:relative;}
.bea i{position:absolute;inset:0;border-radius:50%;border:2px solid var(--g);opacity:0;animation:p 2s infinite;}
.bea i:nth-child(2){animation-delay:.66s}.bea i:nth-child(3){animation-delay:1.33s}
.bea b{position:absolute;inset:20px;border-radius:50%;background:var(--g);}
@keyframes p{0%{transform:scale(.3);opacity:.9}100%{transform:scale(1);opacity:0}}
.wait h3{font-family:Oswald,sans-serif;font-weight:600;font-size:16px;}
.wait p{font-size:12.5px;color:var(--dim);margin-top:5px;}
.price{font-family:'Roboto Mono',monospace;font-weight:700;font-size:17px;}
.pick{background:var(--g);color:#06120b;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:44px 26px;color:var(--dim);font-size:13px;line-height:1.6;}
.empty b{display:block;font-family:Oswald,sans-serif;font-size:16px;color:var(--ink);margin-bottom:6px;}
.ok{width:60px;height:60px;border-radius:20px;background:var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.conf{padding:24px 20px;text-align:center;}
.conf h3{font-family:Oswald,sans-serif;font-weight:600;font-size:19px;}
.conf p{font-size:12.5px;color:var(--dim);margin-top:6px;}
.dbox{margin-top:18px;background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;text-align:left;}
.fl{padding:10px 18px;}
.fr{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;}
.fr label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;}
.fr input{width:100%;background:transparent;border:none;outline:none;color:var(--ink);font-size:15px;font-weight:500;font-family:Inter,sans-serif;}
.fr input::placeholder{color:var(--dim);font-weight:400;}
.sv{padding:6px 18px 24px;}
.obar{display:flex;align-items:center;justify-content:space-between;margin:14px;padding:14px;background:var(--surf);border:1px solid var(--line);border-radius:15px;}
.obar.off{border-color:rgba(226,88,90,.45);}
.obar .l{font-size:14px;font-weight:600;}
.obar.off .l{color:var(--red);}
.tg{width:46px;height:27px;border-radius:100px;background:var(--line2);position:relative;cursor:pointer;transition:.2s;flex-shrink:0;}
.tg.on{background:var(--g);}
.tg b{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;}
.tg.on b{left:22px;}
.req{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:15px;margin:0 14px 11px;box-shadow:var(--sh);animation:in .3s;}
.req.direct{border-color:var(--am);}
.req .rt{font-size:15.5px;font-weight:600;}
.req .rm{font-size:12.5px;color:var(--dim);margin-top:4px;}
.req .rp{display:flex;align-items:center;gap:8px;margin-top:12px;}
.req .rp input{width:100px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:10px;color:var(--ink);font-family:'Roboto Mono',monospace;font-weight:700;font-size:15px;text-align:center;outline:none;}
.ra{display:flex;gap:8px;margin-top:10px;}
.ra .acc{flex:1;background:var(--g);color:#06120b;border:none;border-radius:11px;padding:12px;font-weight:700;font-size:13.5px;cursor:pointer;}
.ra .skip{background:transparent;color:var(--dim);border:1px solid var(--line2);border-radius:11px;padding:12px 16px;font-weight:600;font-size:13.5px;cursor:pointer;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.3px;}
.badge.am{background:rgba(242,167,59,.2);color:var(--am);}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
.ast{background:var(--surf);border:1px solid var(--line);border-radius:15px;padding:15px;}
.ast .n{font-family:'Roboto Mono',monospace;font-weight:700;font-size:23px;}
.ast .n.g{color:var(--g)}.ast .n.a{color:var(--am)}
.ast .l{font-size:11.5px;color:var(--dim);margin-top:5px;}
.ai{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);}
.ai .ava{width:38px;height:38px;font-size:14px;border-radius:11px;}
.rolebtn{background:transparent;color:var(--dim);border:1px solid var(--line2);border-radius:9px;padding:7px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
nav{display:flex;background:var(--elev);border-top:1px solid var(--line);padding:9px 8px calc(14px + env(safe-area-inset-bottom));flex-shrink:0;}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--dim);cursor:pointer;padding:4px 0;}
.nb.active{color:var(--g);}
.nb svg{width:21px;height:21px;}
.ph{padding:24px 20px 18px;text-align:center;background:var(--elev);border-bottom:1px solid var(--line);}
.pa{width:70px;height:70px;border-radius:22px;margin:0 auto 12px;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-weight:700;font-size:27px;color:#06120b;}
.pn{font-family:Oswald,sans-serif;font-weight:600;font-size:19px;}
.pr{font-size:12.5px;color:var(--dim);margin-top:3px;}
.ml{padding:6px 18px 24px;}
.mi{display:flex;align-items:center;justify-content:space-between;padding:15px 4px;border-bottom:1px solid var(--line);font-size:14.5px;font-weight:500;cursor:pointer;}
.mi .c{color:var(--dim);}
.mask{position:fixed;inset:0;background:rgba(4,6,5,.7);z-index:80;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:430px;background:var(--surf);border-radius:22px 22px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));}
.sheet h3{font-family:Oswald,sans-serif;font-weight:600;font-size:17px;margin-bottom:4px;}
.sheet .s{font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.5;}
.sa{display:flex;gap:8px;margin-top:14px;}
.sa button{flex:1;border-radius:12px;padding:13px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
.sa .c{background:transparent;border:1px solid var(--line2);color:var(--dim);}
.sa .o{background:var(--g);color:#06120b;}

.abar{display:flex;align-items:center;gap:12px;background:var(--surf);border-top:1px solid var(--g);padding:11px 16px;cursor:pointer;flex-shrink:0;}
.abar .ava{width:36px;height:36px;font-size:14px;border-radius:11px;}
.abar .t{flex:1;min-width:0;}
.abar .t b{font-size:13px;display:block;}
.abar .t span{font-size:11.5px;color:var(--dim);}
.abar .g{font-size:12px;font-weight:700;color:var(--g);}
.fav{background:none;border:none;font-size:22px;line-height:1;cursor:pointer;color:var(--line2);padding:4px 6px;}
.fav.on{color:var(--red);}
.stars{display:flex;gap:8px;justify-content:center;margin:6px 0 4px;}
.stars span{font-size:32px;cursor:pointer;color:var(--line2);line-height:1;}
.stars span.on{color:var(--am);}
.ta{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:11px;color:var(--ink);font-family:Inter,sans-serif;font-size:14px;outline:none;resize:none;min-height:70px;}
.sec{padding:14px 18px 4px;font-family:Oswald,sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
.opt{display:flex;align-items:center;gap:11px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:var(--bg);}
.opt.sel{border-color:var(--g);background:var(--gs);}
.opt .rd{width:18px;height:18px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;}
.opt.sel .rd{border-color:var(--g);background:var(--g);box-shadow:inset 0 0 0 3px var(--surf);}
.opt .tx{font-size:14px;font-weight:500;}
.opt .tx small{display:block;font-size:11.5px;color:var(--dim);font-weight:400;margin-top:2px;}
.cp{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:14px;margin:0 14px 11px;}
.cp .rs{font-size:14.5px;font-weight:600;margin-top:8px;}
.cp .mt{font-size:11.5px;color:var(--dim);margin-top:4px;}
.cp .ra{margin-top:11px;}
.cp .ra button{flex:1;border-radius:10px;padding:10px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--ink);}
.cp .ra .w{border-color:var(--am);color:var(--am);}
.cp .ra .b{border-color:var(--red);color:var(--red);}
.cp .ra .o{border-color:var(--g);color:var(--g);}
.badge.red{background:rgba(226,88,90,.18);color:var(--red);}
.rv{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line);}
.rv .ava{width:34px;height:34px;font-size:13px;border-radius:10px;}

.up{display:flex;gap:10px;align-items:center;padding:11px 12px;border:1px dashed var(--line2);border-radius:12px;margin-bottom:9px;cursor:pointer;}
.up.done{border-style:solid;border-color:var(--g);}
.up .ic{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;}
.up .ic img{width:100%;height:100%;object-fit:cover;}
.up .tx{flex:1;font-size:13.5px;font-weight:500;}
.up .tx small{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:2px;}
.up .st{font-size:11px;color:var(--dim);}
.up.done .st{color:var(--g);font-weight:700;}
.docs{display:flex;gap:8px;margin-top:10px;}
.docs a{flex:1;}
.docs img{width:100%;height:74px;object-fit:cover;border-radius:10px;border:1px solid var(--line);display:block;}
.docs .cap{font-size:10px;color:var(--dim);text-align:center;margin-top:3px;}
.chat{display:flex;flex-direction:column;height:100%;}
.cm{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:78%;padding:10px 13px;border-radius:15px;font-size:13.5px;line-height:1.4;}
.msg.them{align-self:flex-start;background:var(--surf);border:1px solid var(--line);border-bottom-left-radius:5px;}
.msg.me{align-self:flex-end;background:var(--g);color:#06120b;border-bottom-right-radius:5px;font-weight:500;}
.msg .who{font-size:10.5px;opacity:.7;display:block;margin-bottom:2px;}
.ci{display:flex;gap:8px;padding:10px 12px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--elev);}
.ci input{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:22px;padding:12px 16px;color:var(--ink);font-size:14px;outline:none;font-family:Inter,sans-serif;}
.ci button{width:44px;height:44px;border-radius:50%;background:var(--g);border:none;cursor:pointer;flex-shrink:0;color:#06120b;font-size:18px;}
.ern{display:flex;gap:10px;padding:14px;}

.gate{padding:40px 22px;text-align:center;}
.gate h2{font-family:Oswald,sans-serif;font-size:20px;margin-bottom:8px;}
.gate p{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:22px;}
.dcard{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:11px;box-shadow:var(--sh);display:flex;gap:12px;align-items:flex-start;}
.dcard .info{flex:1;min-width:0;}
.dcard .nmx{font-size:15px;font-weight:600;}
.dcard .row{display:flex;align-items:center;gap:6px;font-size:12.5px;margin-top:5px;}
.dcard .row .k{color:var(--dim);}
.dcard .car{color:var(--ink);font-weight:500;}
.dcard .plate{font-family:'Roboto Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:1px 5px;}
.dcard .loc{color:var(--g);font-weight:500;}
.dcard .btns{display:flex;gap:8px;margin-top:11px;}
.dcard .call{flex:1;background:var(--g);color:#06120b;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;}
.tmr{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--am);}
.seg{display:flex;gap:6px;padding:12px 14px 4px;overflow-x:auto;}
.seg div{flex-shrink:0;padding:8px 14px;border-radius:100px;border:1px solid var(--line2);font-size:12.5px;font-weight:600;color:var(--dim);cursor:pointer;white-space:nowrap;}
.seg div.on{background:var(--g);border-color:var(--g);color:#06120b;}
.dt{display:flex;gap:8px;padding:0 14px 10px;}
.dt input{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:10px;color:var(--ink);font-size:13px;outline:none;font-family:Inter,sans-serif;}

.citybtn{background:var(--surf);border:1px solid var(--line);border-radius:100px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:5px;}
.shift{display:flex;align-items:center;gap:10px;margin:0 14px 14px;padding:12px 14px;background:var(--gs);border:1px solid var(--g);border-radius:14px;}
.shift .t{flex:1;}
.shift .t b{font-size:13.5px;display:block;}
.shift .t span{font-size:11.5px;color:var(--dim);}
.shift .clk{font-family:'Roboto Mono',monospace;font-weight:700;font-size:17px;color:var(--g);}

#err{position:fixed;left:10px;right:10px;bottom:70px;background:#3a1518;border:1px solid var(--red);color:#ffd7d9;padding:12px 14px;border-radius:12px;font-size:12.5px;z-index:95;display:none;line-height:1.5;}
#err b{display:block;margin-bottom:3px;color:var(--red);}
#err .x{position:absolute;top:8px;right:10px;color:var(--dim);cursor:pointer;}
.cd{font-family:'Roboto Mono',monospace;font-size:13px;color:var(--am);font-weight:700;margin-top:8px;}
.ob{padding:36px 24px;text-align:center;display:flex;flex-direction:column;height:100%;}
.ob .em{font-size:56px;margin-bottom:18px;}
.ob h2{font-family:Oswald,sans-serif;font-size:22px;margin-bottom:10px;}
.ob p{font-size:14px;color:var(--dim);line-height:1.65;}
.ob .dots{display:flex;gap:7px;justify-content:center;margin:22px 0 16px;}

<script>
const SUPABASE_URL="https://wygmuydnodwpbtsdfjuq.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5Z211eWRub2R3cGJ0c2RmanVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODA5MTAsImV4cCI6MjEwMDE1NjkxMH0.hrU9TwCQzplTLkShaF8djP9PqANbBrTCJuvlNk84dGw";
const OWNER_ID=8672930773;

const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const tg=window.Telegram?.WebApp;try{tg?.ready();tg?.expand();}catch(e){}
const tu=tg?.initDataUnsafe?.user;
const START=new URLSearchParams(location.search).get('s')||tg?.initDataUnsafe?.start_param||'';
let tgId=tu?.id;
if(!tgId){let s=localStorage.getItem('bmb_id');if(!s){s=Math.floor(Math.random()*1e9);localStorage.setItem('bmb_id',s);}tgId=Number(s);}
const tgName=tu?.first_name||('Гость'+String(tgId).slice(-3));

let me=null,role='passenger',pTab='home',dTab='inbox',aTab='over';

function showErr(msg){const e=document.getElementById('err');document.getElementById('errt').textContent=msg;e.style.display='block';}
function hideErr(){document.getElementById('err').style.display='none';}
function netMsg(e){
 const m=(e&&e.message)||String(e||'');
 if(!navigator.onLine)return 'Нет интернета. Проверьте связь и повторите.';
 if(/Failed to fetch|NetworkError|network/i.test(m))return 'Связь с сервером пропала. Проверьте интернет и повторите.';
 if(/column .* does not exist|schema cache/i.test(m))return 'Приложение обновилось, а база — нет. Нужно выполнить последний SQL в Supabase.\n\n'+m;
 if(/row-level security|permission/i.test(m))return 'Нет прав на это действие.\n\n'+m;
 return m;
}
async function Q(promise,what){
 try{
  const r=await promise;
  if(r&&r.error){showErr((what?what+': ':'')+netMsg(r.error));return{data:null,error:r.error};}
  hideErr();return r;
 }catch(e){showErr((what?what+': ':'')+netMsg(e));return{data:null,error:e};}
}
window.addEventListener('unhandledrejection',e=>showErr(netMsg(e.reason)));
window.addEventListener('offline',()=>showErr('Нет интернета. Данные не обновляются.'));
window.addEventListener('online',()=>{hideErr();T('Связь восстановлена');});
const T=t=>{const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>e.classList.remove('show'),2600);};
const esc=s=>String(s==null?'':s).replace(/[<>"']/g,'');
const jget=f=>{try{return JSON.parse(me[f]||'[]')}catch(e){return[]}};
const places=()=>jget('places');
const favs=()=>jget('favs');
const isStaff=()=>me&&['owner','admin','moderator'].includes(me.staff_role);
const isDrv=()=>me&&(me.role==='driver'||me.role==='both');

const MIG=[
 ['users','city','db-7.sql'],
 ['users','onboarded','db-9.sql'],
 ['users','cancel_as_driver','db-8.sql'],
 ['users','doc_license','db-5.sql'],
 ['users','favs','db-4.sql'],
 ['rides','arrived','db-9.sql'],
 ['reviews','visible','db-9.sql']
];
async function checkSchema(){
 const missing=new Set();
 for(const[t,c,f] of MIG){
  const{error}=await db.from(t).select(c).limit(1);
  if(error)missing.add(f);
 }
 const{error:se}=await db.from('shifts').select('id').limit(1);
 if(se)missing.add('db-7.sql');
 return [...missing];
}
async function boot(){
 try{
  let{data}=await db.from('users').select('*').eq('telegram_id',tgId).maybeSingle();
  if(!data){const r=await db.from('users').insert({telegram_id:tgId,name:tgName}).select().single();if(r.error)throw r.error;data=r.data;}
  me=data;
  if(tgId===OWNER_ID&&me.staff_role!=='owner'){await db.from('users').update({staff_role:'owner'}).eq('id',me.id);me.staff_role='owner';}
  if(me.is_banned){document.getElementById('boot').innerHTML='<div style="color:#e2585a"><b>Доступ закрыт</b><br><br>Ваш аккаунт заблокирован модерацией.</div>';return;}
  document.getElementById('boot').style.display='none';
  const miss=await checkSchema();
  if(miss.length){
   document.getElementById('boot').style.display='flex';
   document.getElementById('boot').innerHTML='<div style="color:#e2585a;line-height:1.6"><b>База не обновлена</b><br><br>Не выполнены файлы:<br><b>'+miss.join('<br>')+'</b><br><br>Откройте Supabase → SQL Editor и выполните их, затем перезапустите приложение.</div>';
   return;
  }
  if(!me.onboarded){onboard(0);return;}
  if(!me.phone){phoneGate();return;}
  if(!me.city){cityGate();return;}
  paintCity();
  drawRoles();count();setInterval(count,12000);
  await restore();await restoreD();
  setRole('passenger');
  if(START==='order'){targetDrv=null;pTab=active?'ride':'order';drawP();}
  if(START==='profile'){pTab='profile';drawP();}
  if(START==='driver'){ if(isDrv()){setRole('driver');} else {pTab='profile';drawP();setTimeout(()=>{if(!isDrv()&&me.driver_status!=='pending')applyDrv();},300);} }
 }catch(e){document.getElementById('boot').innerHTML='<div style="color:#e2585a">Ошибка базы:<br><br>'+e.message+'<br><br>Выполните db-4.sql в Supabase.</div>';}
}
const OB=[
 ['🚕','Своё такси в городе','Здесь собраны местные водители — те же бомбилы, что в чатах, только заявка уходит всем сразу и не теряется среди сообщений.'],
 ['💬','Цену называет водитель','Вы пишете, куда едете. Водители присылают свою цену — вы выбираете, кто устраивает. Никаких тарифов и наценок.'],
 ['♥','Свои водители','Понравился водитель — жмите сердечко. Потом сможете звать его напрямую, а он увидит, что заявка лично от вас.']
];
function onboard(i){
 document.getElementById('rsw').style.display='none';
 document.getElementById('nav').innerHTML='';
 document.getElementById('abar').innerHTML='';
 const[em,h,p]=OB[i];
 document.getElementById('main').innerHTML=`<div class="ob"><div style="flex:1;display:flex;flex-direction:column;justify-content:center"><div class="em">${em}</div><h2>${h}</h2><p>${p}</p></div><div class="dots">${OB.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('')}</div><button class="btn" onclick="${i<OB.length-1?`onboard(${i+1})`:'finishOb()'}">${i<OB.length-1?'Дальше':'Начать'}</button>${i<OB.length-1?'<button class="btn ghost" onclick="finishOb()">Пропустить</button>':''}</div>`;
}
async function finishOb(){
 await db.from('users').update({onboarded:true}).eq('id',me.id);
 me.onboarded=true;
 if(!me.phone){phoneGate();return;}
 if(!me.city){cityGate();return;}
 paintCity();
 drawRoles();count();await restore();await restoreD();setRole('passenger');
}
const CITIES=['Донецк','Макеевка','Харцызск','Горловка','Енакиево'];
function cityGate(){
 document.getElementById('rsw').style.display='none';
 document.getElementById('nav').innerHTML='';
 document.getElementById('main').innerHTML=`<div class="gate"><h2>Выберите город</h2><p>Вы будете видеть только водителей и заявки своего города. Поменять можно в любой момент вверху экрана.</p><div id="cl"></div></div>`;
 document.getElementById('cl').innerHTML=CITIES.map(c=>`<div class="opt" onclick="setCity('${c}')"><div class="rd"></div><div class="tx">${c}</div></div>`).join('');
}
async function setCity(c){
 const{error}=await Q(db.from('users').update({city:c}).eq('id',me.id),'Не удалось сохранить город');
 if(error)return;
 me.city=c;closeSh();T('Город сохранён: '+c);
 paintCity();
 drawRoles();count();
 await restore();await restoreD();setRole('passenger');
}
function paintCity(){
 const b=document.getElementById('cbar');
 if(me&&me.city){document.getElementById('cityn').textContent=me.city;b.style.display='flex';}
 else b.style.display='none';
}
function cityPick(){
 const m=document.createElement('div');m.className='mask';m.id='sh';
 m.innerHTML=`<div class="sheet"><h3>Город</h3><div class="s">Показываем водителей и заявки только выбранного города</div>${CITIES.map(c=>`<div class="opt ${c===me.city?'sel':''}" onclick="setCity('${c}')"><div class="rd"></div><div class="tx">${c}</div></div>`).join('')}<div class="sa"><button class="c" onclick="closeSh()">Закрыть</button></div></div>`;
 document.getElementById('device').appendChild(m);
}
function phoneGate(){
 document.getElementById('rsw').style.display='none';
 document.getElementById('nav').innerHTML='';
 document.getElementById('main').innerHTML=`<div class="gate"><h2>Укажите телефон</h2><p>Без номера сервис не работает: водитель и пассажир должны видеть контакты друг друга, когда заказ подтверждён.</p><div class="fr"><label>Ваше имя</label><input id="g1" value="${esc(me.name)}"></div><div class="fr"><label>Телефон</label><input id="g2" value="" inputmode="tel" placeholder="+7 900 000-00-00"></div><button class="btn" onclick="saveGate()">Продолжить</button></div>`;
}
async function saveGate(){
 const n=document.getElementById('g1').value.trim(),p=document.getElementById('g2').value.trim();
 if(!n)return T('Введите имя');
 if(p.replace(/\D/g,'').length<7)return T('Введите корректный телефон');
 const{error}=await Q(db.from('users').update({name:n,phone:p}).eq('id',me.id),'Не удалось сохранить');
 if(error)return;
 me.name=n;me.phone=p;T('Спасибо!');
 if(!me.city){cityGate();return;}
 paintCity();
 drawRoles();count();await restore();await restoreD();setRole('passenger');
}
setInterval(async()=>{
 if(me&&me.status==='online'){
   await db.from('users').update({last_active:new Date().toISOString(),idle_warned:false}).eq('id',me.id);
 }
},120000);
async function count(){const{count:c}=await db.from('users').select('*',{count:'exact',head:true}).eq('status','online').eq('city',me.city||'');const e=document.getElementById('onl');if(e)e.textContent=c||0;}

async function restore(){
 const{data}=await db.from('rides').select('*').eq('passenger_id',me.id).in('status',['created','confirmed']).order('created_at',{ascending:false}).limit(1);
 if(data&&data.length){active=data[0];if(active.status==='created')subOffers(active.id);}
}
async function restoreD(){
 const{data}=await db.from('rides').select('*').eq('driver_id',me.id).in('status',['confirmed','in_progress']).order('created_at',{ascending:false}).limit(1);
 if(data&&data.length)dActive=data[0];
 const{data:o}=await db.from('offers').select('*').eq('driver_id',me.id).eq('status','pending');
 myOffs=o||[];
 const{data:sh}=await db.from('shifts').select('*').eq('driver_id',me.id).is('ended_at',null).order('started_at',{ascending:false}).limit(1);
 curShift=(sh&&sh.length)?sh[0]:null;
}
function subRide(id){
 if(rideCh)db.removeChannel(rideCh);
 rideCh=db.channel('r'+id).on('postgres_changes',{event:'UPDATE',schema:'public',table:'rides',filter:'id=eq.'+id},p=>{
  const r=p.new;
  if(role==='passenger'&&active&&active.id===r.id){
    active=r;
    if(r.status==='created'&&!r.driver_id){T('Водитель отменил — ищем снова');subOffers(r.id);}
    if(pTab==='ride')openRide();
 if(pTab==='chat')openChat(active?.id,'passenger');else drawBar();
  }
  if(role==='driver'&&dActive&&dActive.id===r.id){
    if(['completed','cancelled_by_passenger_free'].includes(r.status)){dActive=null;T('Пассажир завершил заказ');drawD();}
  }
 }).subscribe();
}
function drawBar(){
 const b=document.getElementById('abar');
 if(role==='passenger'){
  if(!active||pTab==='ride'){b.innerHTML='';return;}
  const conf=active.status==='confirmed';
  b.innerHTML=`<div class="abar" onclick="openRide()"><div class="ava">${conf?'🚗':'⏳'}</div><div class="t"><b>${conf?'Бомбила в пути':'Ждём предложений'}</b><span>${esc(active.to_address)}</span></div><span class="g">Открыть ›</span></div>`;
  return;
 }
 if(role==='driver'){
  if(!dActive||dTab==='ride'){b.innerHTML='';return;}
  b.innerHTML=`<div class="abar" onclick="dGo('ride')"><div class="ava">🚗</div><div class="t"><b>Активный заказ</b><span>${esc(dActive.to_address)}</span></div><span class="g">Открыть ›</span></div>`;
  return;
 }
 b.innerHTML='';
}

function drawRoles(){
 const s=document.getElementById('rsw');
 if(!isDrv()&&!isStaff()){s.style.display='none';return;}
 let h=`<div class="rb ${role==='passenger'?'on':''}" onclick="setRole('passenger')">Пассажир</div>`;
 if(isDrv())h+=`<div class="rb ${role==='driver'?'on':''}" onclick="setRole('driver')">Водитель</div>`;
 if(isStaff())h+=`<div class="rb ${role==='admin'?'on':''}" onclick="setRole('admin')">Панель</div>`;
 s.style.display='flex';s.innerHTML=h;
}
function setRole(r){
 if(r==='admin'&&!isStaff())return T('Нет доступа');
 if(r==='driver'&&!isDrv())return T('Сначала пройдите модерацию');
 role=r;drawRoles();
 if(r==='passenger'){pTab='home';drawP();}
 if(r==='driver'){dTab='inbox';drawD();}
 if(r==='admin'){aTab='over';drawA();}
}

/* ================= ПАССАЖИР ================= */
function drawP(){
 document.getElementById('nav').innerHTML=`
 <button class="nb ${pTab==='home'?'active':''}" onclick="pGo('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Главная</button>
 <button class="nb ${pTab==='favs'?'active':''}" onclick="pGo('favs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l8.8 8.6 8.8-8.6a5.5 5.5 0 000-7.8z"/></svg>Свои</button>
 <button class="nb ${pTab==='trips'?'active':''}" onclick="pGo('trips')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>Поездки</button>
 <button class="nb ${pTab==='profile'?'active':''}" onclick="pGo('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button>`;
 const m=document.getElementById('main');
 if(pTab==='home')home(m);
 if(pTab==='order')m.innerHTML=`<div id="host">${formHTML(targetDrv)}</div>`;
 if(pTab==='ride')openRide();
 if(pTab==='chat')openChat(active?.id,'passenger');
 if(pTab==='favs')favsView(m);
 if(pTab==='trips')trips(m);
 if(pTab==='profile')m.innerHTML=profHTML();
 drawBar();
}
const pGo=t=>{pTab=t;drawP();};

async function home(m){
 m.innerHTML=`<div class="hero"><div class="hgrid"><div class="hs"><div class="n g" id="c1">…</div><div class="l">водителей на линии</div></div><div class="hs"><div class="n a" id="c2">…</div><div class="l">открытых заявок</div></div></div><button class="cta" onclick="targetDrv=null;pTab='order';drawP()">Заявка всем водителям</button></div><div class="head"><h2>Свободные водители</h2><span class="m">нажмите, чтобы позвать</span></div><div class="list" id="dl"><div class="empty">Загрузка…</div></div>`;
 const{data:ds,error:dsE}=await Q(db.from('users').select('*').eq('status','online').eq('city',me.city).in('role',['driver','both']),'Не удалось загрузить водителей');
 const{count:rc}=await db.from('rides').select('*',{count:'exact',head:true}).eq('status','created').eq('city',me.city);
 const a=document.getElementById('c1');if(a)a.textContent=(ds||[]).length;
 const b=document.getElementById('c2');if(b)b.textContent=rc||0;
  const l=document.getElementById('dl');if(!l)return;
 if(!ds||!ds.length){l.innerHTML='<div class="empty"><b>В городе '+esc(me.city)+' сейчас никого нет</b>Как только водитель выйдет на линию — он появится здесь. Если тестируете сами: у водителя должен быть выбран тот же город и включён тумблер «на линии».</div>';return;}
 l.innerHTML=ds.map(d=>drvCard(d)).join('');
}
function drvCard(d){
 const on=favs().includes(d.id);
 return `<div class="dcard"><div class="ava" onclick="pickDriver('${d.id}')">${esc(d.name)[0]||'?'}</div>
 <div class="info" onclick="pickDriver('${d.id}')">
  <div class="nmx">${esc(d.name)}</div>
  <div class="row"><span class="k">🚗</span><span class="car">${esc(d.car)||'машина не указана'}</span>${d.plate?`<span class="plate">${esc(d.plate)}</span>`:''}</div>
  <div class="row"><span class="k">📍 стоит:</span><span class="loc">${esc(d.spot)||'место не указано'}</span></div>
  ${d.status!=='online'?'<div class="row"><span class="k">сейчас оффлайн</span></div>':''}
 </div>
 <button class="fav ${on?'on':''}" onclick="event.stopPropagation();togFav('${d.id}')">♥</button></div>`;
}
async function favsView(m){
 const F=favs();
 m.innerHTML='<div class="head"><h2>Свои водители</h2></div><div class="list"><div class="empty">Загрузка…</div></div>';
 const l=m.querySelector('.list');
 if(!F.length){l.innerHTML='<div class="empty"><b>Пока пусто</b>Нажмите ♥ у водителя — он появится здесь, и вы сможете звать его напрямую.</div>';return;}
 const{data}=await db.from('users').select('*').in('id',F);
 if(!data||!data.length){l.innerHTML='<div class="empty">Никого не найдено</div>';return;}
 const on=data.filter(d=>d.status==='online'),off=data.filter(d=>d.status!=='online');
 l.innerHTML=(on.length?`<div class="sec">На линии · ${on.length}</div>`+on.map(d=>drvCard(d)).join(''):'')+
             (off.length?`<div class="sec">Сейчас оффлайн · ${off.length}</div>`+off.map(d=>drvCard(d)).join(''):'');
}
async function togFav(id){
 let F=favs();
 if(F.includes(id)){F=F.filter(x=>x!==id);T('Убрали из своих');}else{F.push(id);T('Добавили в свои');}
 me.favs=JSON.stringify(F);
 await db.from('users').update({favs:me.favs}).eq('id',me.id);
 if(pTab==='home')home(document.getElementById('main'));
 if(pTab==='favs')favsView(document.getElementById('main'));
}

async function pickDriver(id){
 const{data}=await db.from('users').select('*').eq('id',id).single();
 targetDrv=data;pTab='order';drawP();
}
function formHTML(d){

  e.textContent='заявка живёт ещё '+Math.floor(ms/60000)+':'+String(Math.floor(ms%60000/1000)).padStart(2,'0');

 upd();cdTick=setInterval(upd,1000);

function shrink(file,max){
 return new Promise((res,rej)=>{
  const img=new Image();const rd=new FileReader();
  rd.onload=e=>{img.src=e.target.result;};
  rd.onerror=()=>rej(new Error('не удалось прочитать файл'));
  img.onload=()=>{
   let{width:w,height:h}=img;
   if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
   const c=document.createElement('canvas');c.width=w;c.height=h;
   c.getContext('2d').drawImage(img,0,0,w,h);
   c.toBlob(b=>b?res(b):rej(new Error('не удалось сжать')),'image/jpeg',0.8);
  };
  img.onerror=()=>rej(new Error('это не изображение'));
  rd.readAsDataURL(file);
 });
}

  try{
   const small=await shrink(f,1200);
   const path=`${me.id}/${kind}_${Date.now()}.jpg`;
   const{error}=await db.storage.from('docs').upload(path,small,{upsert:true,contentType:'image/jpeg'});
   if(error)throw error;

  <div class="${ePeriod==='custom'?'on':''}" onclick="setPer('custom')">Период</div>
 </div>
 ${ePeriod==='custom'?`<div class="dt"><input type="date" id="ef" value="${eFrom}" onchange="eFrom=this.value;earn(document.getElementById('main'))"><input type="date" id="et" value="${eTo}" onchange="eTo=this.value;earn(document.getElementById('main'))"></div>`:''}
 <div class="ern"><div class="hs"><div class="n g">${sum(sel)} ₽</div><div class="l">заработано · ${sel.length} поездок</div></div><div class="hs"><div class="n a">${avg} ₽</div><div class="l">средний чек</div></div></div>
 <div class="sec">По дням</div>
 ${Object.keys(byDay).length?Object.entries(byDay).map(([k,v])=>`<div class="card"><div style="flex:1"><div class="nm">${k}</div><div class="sub">${v.n} поездок</div></div><div class="price">${v.s} ₽</div></div>`).join(''):'<div class="empty">За этот период поездок не было</div>'}
 <div class="sec">Поездки</div>
 ${sel.length?sel.slice(0,30).map(r=>`<div class="card"><div style="flex:1;min-width:0"><div class="nm" style="font-size:14px">${esc(r.from_address)} → ${esc(r.to_address)}</div><div class="sub">${new Date(r.created_at).toLocaleString('ru',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})} · ${esc(r.passenger_name)}</div></div><div class="price">${r.price||'—'} ₽</div></div>`).join(''):'<div class="empty"><b>Пусто</b>Завершённые поездки появятся здесь.</div>'}
 <div style="height:20px"></div>`;
}
function setPer(p){ePeriod=p;earn(document.getElementById('main'));}
function dProfHTML(){
 return `<div class="ph"><div class="pa">${esc(me.name)[0]||'?'}</div><div class="pn">${esc(me.name)}</div><div class="pr">Водитель · ${esc(me.car)||'машина не назначена'}${me.plate?' · '+esc(me.plate):''}</div><div class="pr" style="margin-top:2px">⭐ ${me.rating||5} · отказов от заказов: ${me.cancel_as_driver||0}</div></div><div class="fl"><div class="fr"><label>Имя</label><input id="d1" value="${esc(me.name)}"></div><div class="fr"><label>Телефон</label><input id="d2" value="${esc(me.phone)}" inputmode="tel"></div><div class="fr"><label>Где стою</label><input id="d3" value="${esc(me.spot)}" placeholder="центр, у рынка…"></div><div class="fr" style="opacity:.65"><label>Машина · назначает админ 🔒</label><input value="${esc(me.car)||'—'}" disabled></div><div class="fr" style="opacity:.65"><label>Гос. номер · назначает админ 🔒</label><input value="${esc(me.plate)||'—'}" disabled></div></div><div class="sv"><button class="btn" onclick="saveD()">Сохранить</button><button class="btn ghost" onclick="setRole('passenger')">Вернуться как пассажир</button></div>`;
}
async function saveD(){
 const n=document.getElementById('d1').value.trim();if(!n)return T('Введите имя');
 const p={name:n,phone:document.getElementById('d2').value.trim(),spot:document.getElementById('d3').value.trim()};
 await db.from('users').update(p).eq('id',me.id);Object.assign(me,p);T('Сохранено');drawD();
}

/* ================= ПАНЕЛЬ ================= */
function drawA(){
 document.getElementById('abar').innerHTML='';
 document.getElementById('nav').innerHTML=`
 <button class="nb ${aTab==='over'?'active':''}" onclick="aGo('over')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Обзор</button>
 <button class="nb ${aTab==='apps'?'active':''}" onclick="aGo('apps')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Заявки</button>
 <button class="nb ${aTab==='cmp'?'active':''}" onclick="aGo('cmp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Жалобы</button>
 <button class="nb ${aTab==='ppl'?'active':''}" onclick="aGo('ppl')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Люди</button>`;
 const m=document.getElementById('main');m.innerHTML='<div class="empty">Загрузка…</div>';
 if(aTab==='over')aOver(m);
 if(aTab==='apps')aApps(m);
 if(aTab==='cmp')aCmp(m);
 if(aTab==='ppl')aPpl(m);
}
const aGo=t=>{aTab=t;drawA();};
async function aOver(m){
 const today=new Date();today.setHours(0,0,0,0);
 const[{count:all},{count:td},{count:on},{count:done},{data:apps},{data:cmp},{data:rv},{count:us}]=await Promise.all([
  db.from('rides').select('*',{count:'exact',head:true}),
  db.from('rides').select('*',{count:'exact',head:true}).gte('created_at',today.toISOString()),
  db.from('users').select('*',{count:'exact',head:true}).eq('status','online'),
  db.from('rides').select('*',{count:'exact',head:true}).eq('status','completed'),
  db.from('users').select('id').eq('driver_status','pending'),
  db.from('complaints').select('*').eq('status','pending'),
  db.from('reviews').select('*').eq('visible',true).order('created_at',{ascending:false}).limit(5),
  db.from('users').select('*',{count:'exact',head:true})
 ]);
 const avg=rv&&rv.length?(rv.reduce((s,r)=>s+r.rating,0)/rv.length).toFixed(1):'—';
 m.innerHTML=`<div class="head"><h2>Панель · Бомбилы</h2><span class="m">${me.staff_role}</span></div>
 <div class="agrid">
  <div class="ast"><div class="n g">${td||0}</div><div class="l">заявок сегодня</div></div>
  <div class="ast"><div class="n">${on||0}</div><div class="l">на линии</div></div>
  <div class="ast"><div class="n">${done||0}</div><div class="l">завершено поездок</div></div>
  <div class="ast"><div class="n">${all||0}</div><div class="l">заявок всего</div></div>
  <div class="ast" onclick="aGo('apps')" style="cursor:pointer"><div class="n a">${(apps||[]).length}</div><div class="l">заявок в водители ›</div></div>
  <div class="ast" onclick="aGo('cmp')" style="cursor:pointer"><div class="n" style="color:var(--red)">${(cmp||[]).length}</div><div class="l">жалоб открыто ›</div></div>
  <div class="ast"><div class="n a">${avg}</div><div class="l">средняя оценка</div></div>
  <div class="ast"><div class="n">${us||0}</div><div class="l">пользователей</div></div>
 </div>
 <div class="sec">Последние отзывы</div>
 ${(rv&&rv.length)?rv.map(r=>`<div class="rv"><div class="ava">${esc(r.from_name)[0]||'?'}</div><div style="flex:1"><div style="font-size:13.5px;font-weight:600">${esc(r.from_name)} → ${esc(r.target_name)} <span style="color:var(--am)">${'★'.repeat(r.rating)}</span></div>${r.comment?'<div class="sub">'+esc(r.comment)+'</div>':''}</div></div>`).join(''):'<div class="empty">Отзывов пока нет</div>'}
 <div style="height:20px"></div>`;
}
async function aApps(m){
 const{data:apps}=await db.from('users').select('*').eq('driver_status','pending');
 m.innerHTML=`<div class="head"><h2>Заявки в водители</h2><span class="m">${(apps||[]).length}</span></div><div style="padding:8px 0 24px">${(apps||[]).length?apps.map(a=>`<div class="req"><div class="rt">${esc(a.name)}</div><div class="rm">${esc(a.phone)||'без телефона'} · ID ${a.telegram_id}${a.age?' · '+a.age+' лет':''}</div>
<div class="docs">${[['doc_license','права'],['doc_pts','ПТС'],['doc_car','машина']].map(d=>a[d[0]]?`<a href="${a[d[0]]}" target="_blank"><img src="${a[d[0]]}"><div class="cap">${d[1]}</div></a>`:`<div style="flex:1"><div style="height:74px;border:1px dashed var(--line2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px">нет</div><div class="cap">${d[1]}</div></div>`).join('')}</div><div class="fr" style="margin-top:10px"><label>Марка машины</label><input id="ac${a.id}" placeholder="Lada Vesta"></div><div class="fr"><label>Гос. номер</label><input id="ap${a.id}" placeholder="А123ВС"></div><div class="ra"><button class="acc" onclick="okDrv('${a.id}')">Одобрить</button><button class="skip" onclick="noDrv('${a.id}')">Отклонить</button></div></div>`).join(''):'<div class="empty"><b>Новых заявок нет</b>Здесь появятся желающие стать водителями.</div>'}</div>`;
}
async function okDrv(id){
 const c=document.getElementById('ac'+id).value.trim(),p=document.getElementById('ap'+id).value.trim();
 if(!c||!p)return T('Впишите марку и номер');
 await db.from('users').update({role:'driver',driver_status:'approved',car:c,plate:p}).eq('id',id);
 T('Водитель одобрен');drawA();
}
async function noDrv(id){await db.from('users').update({driver_status:'none'}).eq('id',id);T('Отклонено');drawA();}
async function aCmp(m){
 const{data}=await db.from('complaints').select('*').eq('status','pending').order('created_at',{ascending:false});
 m.innerHTML=`<div class="head"><h2>Жалобы</h2><span class="m">${(data||[]).length} открыто</span></div><div style="padding:8px 0 24px">${(data||[]).length?data.map(c=>{
 const isRev=c.kind==='review'&&c.review_id;
 return `<div class="cp"><span class="badge ${isRev?'am':'red'}">${isRev?'спор по отзыву':'жалоба'}</span><div class="rs">${isRev?'Оспаривает: '+esc(c.from_name):'На: '+esc(c.target_name)}</div><div class="mt">${isRev?'':'от '+esc(c.from_name)+' · '}${new Date(c.created_at).toLocaleDateString('ru')}</div><div class="rs" style="font-weight:500;font-size:13.5px">${esc(c.reason)}</div>${c.comment?'<div class="mt">«'+esc(c.comment)+'»</div>':''}<div class="ra">${isRev?`<button class="o" onclick="resolveCmp('${c.id}','dismiss')">Оставить отзыв</button><button class="b" onclick="killReview('${c.id}','${c.review_id}','${c.from_id}')">Удалить отзыв</button>`:`<button class="o" onclick="resolveCmp('${c.id}','dismiss')">Отклонить</button><button class="w" onclick="resolveCmp('${c.id}','warn')">Предупредить</button><button class="b" onclick="resolveCmp('${c.id}','ban','${c.target_id}')">Забанить</button>`}</div></div>`;
}).join(''):'<div class="empty"><b>Жалоб нет</b>Все обращения разобраны.</div>'}</div>`;
}
async function killReview(cid,rid,uid){
 await db.from('reviews').delete().eq('id',rid);
 await db.from('complaints').update({status:'done'}).eq('id',cid);
 const{data:all}=await db.from('reviews').select('rating').eq('target_id',uid);
 const avg=all&&all.length?(all.reduce((s,r)=>s+r.rating,0)/all.length).toFixed(1):5;
 await db.from('users').update({rating:avg}).eq('id',uid);
 T('Отзыв удалён, рейтинг пересчитан');drawA();
}
async function resolveCmp(id,act,target){
 await db.from('complaints').update({status:'done'}).eq('id',id);
 if(act==='ban'&&target)await db.from('users').update({is_banned:true,status:'offline'}).eq('id',target);
 T({dismiss:'Жалоба отклонена',warn:'Предупреждение вынесено',ban:'Пользователь заблокирован'}[act]);
 drawA();
}
async function aPpl(m){
 const{data:us}=await db.from('users').select('*').order('created_at',{ascending:false}).limit(60);
 m.innerHTML=`<div class="head"><h2>Пользователи</h2><span class="m">${(us||[]).length}</span></div><div style="padding:6px 0 24px">${(us||[]).map(u=>{
   const mine=u.id===me.id;
   const can=(me.staff_role==='owner'&&!mine&&u.staff_role!=='owner')||(me.staff_role==='admin'&&!mine&&!['owner','admin'].includes(u.staff_role));
   const bd=u.staff_role&&u.staff_role!=='none'?`<span class="badge am">${u.staff_role==='owner'?'владелец':u.staff_role==='admin'?'админ':'модератор'}</span>`:'';
   const bn=u.is_banned?'<span class="badge red">бан</span>':'';
   return `<div class="ai"><div class="ava">${esc(u.name)[0]||'?'}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${esc(u.name)}${mine?' (вы)':''}</div><div style="font-size:11.5px;color:var(--dim)">${u.role}${u.car?' · '+esc(u.car):''} · ${u.status}</div></div>${bn}${bd}<button class="rolebtn" onclick="userCard('${u.id}')">открыть</button></div>`;
 }).join('')}</div>`;
}
async function userCard(id){
 const{data:u}=await db.from('users').select('*').eq('id',id).single();
 const{data:rv}=await db.from('reviews').select('*').eq('target_id',id).order('created_at',{ascending:false}).limit(10);
 const{data:rd}=await db.from('rides').select('id,status').or(`passenger_id.eq.${id},driver_id.eq.${id}`);
 const own=me.staff_role==='owner';
 const canRole=(own&&u.staff_role!=='owner')||(me.staff_role==='admin'&&!['owner','admin'].includes(u.staff_role));
 const m=document.createElement('div');m.className='mask';m.id='sh';
 m.innerHTML=`<div class="sheet" style="max-height:88vh;overflow-y:auto">
 <h3>${esc(u.name)}</h3><div class="s">ID ${u.telegram_id} · регистрация ${new Date(u.created_at).toLocaleDateString('ru')} · поездок ${(rd||[]).length}</div>
 <div class="fr"><label>Имя</label><input id="e_name" value="${esc(u.name)}"></div>
 <div class="fr"><label>Телефон</label><input id="e_phone" value="${esc(u.phone)}"></div>
 <div class="fr"><label>Возраст</label><input id="e_age" value="${u.age||''}" inputmode="numeric"></div>
 <div class="fr"><label>Марка машины</label><input id="e_car" value="${esc(u.car)}"></div>
 <div class="fr"><label>Гос. номер</label><input id="e_plate" value="${esc(u.plate)}"></div>
 <div class="fr"><label>Где стоит</label><input id="e_spot" value="${esc(u.spot)}"></div>
 <div class="fr"><label>Рейтинг</label><input id="e_rating" value="${u.rating||5}" inputmode="decimal"></div>
 <div class="fr"><label>Роль в сервисе</label><input id="e_role" value="${esc(u.role)}" placeholder="passenger / driver / both"></div>
 <div class="fr"><label>Статус водителя</label><input id="e_ds" value="${esc(u.driver_status)}" placeholder="none / pending / approved"></div>
 ${(u.doc_license||u.doc_pts||u.doc_car)?`<div class="docs">${[['doc_license','права'],['doc_pts','ПТС'],['doc_car','машина']].map(d=>u[d[0]]?`<a href="${u[d[0]]}" target="_blank"><img src="${u[d[0]]}"><div class="cap">${d[1]}</div></a>`:'').join('')}</div>`:''}
 <div class="sec" style="padding-left:0">Отзывы о нём</div>
 ${(rv||[]).length?rv.map(r=>`<div class="rv" style="padding-left:0;padding-right:0"><div class="ava">${esc(r.from_name)[0]||'?'}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(r.from_name)} <span style="color:var(--am)">${'★'.repeat(r.rating)}</span></div>${r.comment?'<div class="sub">'+esc(r.comment)+'</div>':''}</div><button class="rolebtn" onclick="delRev('${r.id}','${id}')">удалить</button></div>`).join(''):'<div class="sub" style="padding:4px 0 8px">отзывов нет</div>'}
 <div class="sa" style="flex-wrap:wrap">
  <button class="c" onclick="closeSh()">Закрыть</button>
  ${canRole?`<button class="c" onclick="closeSh();roleSheet('${u.id}','${esc(u.name)}','${u.staff_role||'none'}')">Права</button>`:''}
  <button class="c" style="color:${u.is_banned?'var(--g)':'var(--red)'};border-color:${u.is_banned?'var(--g)':'var(--red)'}!important" onclick="toggleBan('${u.id}',${!!u.is_banned})">${u.is_banned?'Разбанить':'Забанить'}</button>
  <button class="o" onclick="saveUser('${u.id}')">Сохранить</button>
 </div></div>`;
 document.getElementById('device').appendChild(m);
}
async function saveUser(id){
 const g=x=>document.getElementById('e_'+x).value.trim();
 const p={name:g('name'),phone:g('phone'),age:parseInt(g('age'))||null,car:g('car'),plate:g('plate'),spot:g('spot'),rating:parseFloat(g('rating'))||5,role:g('role')||'passenger',driver_status:g('ds')||'none'};
 const{error}=await db.from('users').update(p).eq('id',id);
 if(error)return T('Ошибка: '+error.message);
 closeSh();T('Изменения сохранены');drawA();
}
async function toggleBan(id,now){
 await db.from('users').update({is_banned:!now,status:'offline'}).eq('id',id);
 closeSh();T(now?'Разблокирован':'Заблокирован');drawA();
}
async function delRev(rid,uid){
 await db.from('reviews').delete().eq('id',rid);
 T('Отзыв удалён');closeSh();userCard(uid);
}
function roleSheet(id,name,cur){
 let sel=cur;
 const opts=me.staff_role==='owner'
   ? [['none','Без прав','обычный пользователь'],['moderator','Модератор','жалобы и заявки водителей'],['admin','Админ','всё + назначение модераторов']]
   : [['none','Без прав','обычный пользователь'],['moderator','Модератор','жалобы и заявки водителей']];
 const m=document.createElement('div');m.className='mask';m.id='sh';
 m.innerHTML=`<div class="sheet"><h3>Права · ${name}</h3><div class="s">Выберите уровень доступа и подтвердите</div><div id="ol"></div><div class="sa"><button class="c" onclick="closeSh()">Отмена</button><button class="o" onclick="applyRole('${id}')">Подтвердить</button></div></div>`;
 document.getElementById('device').appendChild(m);
 const draw=()=>{document.getElementById('ol').innerHTML=opts.map(o=>`<div class="opt ${o[0]===sel?'sel':''}" onclick="window._sr('${o[0]}')"><div class="rd"></div><div class="tx">${o[1]}<small>${o[2]}</small></div></div>`).join('');};
 window._sr=v=>{sel=v;draw();};window._srGet=()=>sel;draw();
}
async function applyRole(id){
 const v=window._srGet();
 await db.from('users').update({staff_role:v}).eq('id',id);
 closeSh();T(v==='none'?'Права сняты':'Назначен: '+(v==='admin'?'админ':'модератор'));drawA();
}
boot();
</script>
</body>
</html>
